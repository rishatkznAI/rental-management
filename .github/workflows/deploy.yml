name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Type of release being deployed
        required: true
        type: choice
        default: full-stack
        options:
          - frontend-only
          - backend
          - full-stack
          - deploy-tooling

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  basic-ci:
    name: Basic CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Check whitespace
        run: git diff --check

      - name: Validate production release secrets
        run: |
          test -n "$PRODUCTION_API_URL"
          test -n "$PRODUCTION_FRONTEND_URL"
          test -n "$PRODUCTION_ADMIN_EMAIL"
          test -n "$PRODUCTION_ADMIN_PASSWORD"
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          PRODUCTION_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: basic-ci
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke spec
        run: npx playwright test e2e/smoke.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

  deploy:
    name: Deploy and production gate
    needs:
      - basic-ci
      - playwright-smoke
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for GitHub Pages propagation
        run: sleep 30

      - name: Run production release preflight
        run: npm run release:preflight -- --env production --expected-commit "$EXPECTED_RELEASE_COMMIT" --release-type "$RELEASE_TYPE"
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TYPE: ${{ inputs.release_type || 'full-stack' }}

      - name: Run production targeted GET smoke
        run: npm run release:targeted-smoke -- --env production
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          PRODUCTION_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}

      - name: Run production smoke login
        run: npm run test:e2e:production-smoke
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          PRODUCTION_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}
          EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TYPE: ${{ inputs.release_type || 'full-stack' }}

      - name: Upload production Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload production Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-test-results
          path: test-results/
          if-no-files-found: ignore
