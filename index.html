
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- Запрет кеширования index.html браузером: всегда загружать свежий бандл -->
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
      <meta http-equiv="Pragma" content="no-cache" />
      <meta http-equiv="Expires" content="0" />
      <title>Система управления арендой</title>
      <script>
        // GitHub Pages SPA redirect: /404.html sends ?p=/path&q=query
        // Convert it back to a normal browser URL before React Router starts.
        (function(l) {
          if (!l.search) return;
          var params = new URLSearchParams(l.search);
          var p = params.get('p');
          if (!p) return;

          var q = params.get('q');
          var pathname = p.replace(/~and~/g, '&');
          var search = q ? ('?' + q.replace(/~and~/g, '&')) : '';
          window.history.replaceState(null, null, l.pathname + pathname + search + l.hash);
        })(window.location);

        // ── Принудительный сброс кеша браузера ──────────────────────────────
        // При новом деплое меняем BUILD_TS — браузер перезагружает страницу,
        // получает свежий index.html с новыми хешированными бандлами.
        // Используем localStorage (не sessionStorage), чтобы сброс не повторялся
        // при каждом открытии вкладки.
        (function() {
          var CACHE_KEY = '__app_cache_v';
          var BUILD_TS  = '20260417_173000';
          var stored    = localStorage.getItem(CACHE_KEY);
          if (stored !== BUILD_TS) {
            localStorage.setItem(CACHE_KEY, BUILD_TS);
            // Перезагружаем, чтобы браузер подхватил свежие хешированные бандлы.
            window.location.reload();
          }
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
