<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Сброс данных — Система управления арендой</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; color: #1f2937; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
    .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
    .badge-created  { background: #fef3c7; color: #92400e; }
    .badge-active   { background: #dbeafe; color: #1e40af; }
    .badge-returned { background: #d1fae5; color: #065f46; }
    .badge-closed   { background: #f3f4f6; color: #6b7280; }
    .mono { font-family: monospace; font-size: 13px; }
    .danger { background: #fee2e2; border-color: #fca5a5; }
    .warning { background: #fffbeb; border-color: #fcd34d; }
    .success { background: #d1fae5; border-color: #6ee7b7; }
    .btn { display: inline-block; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; margin-top: 12px; text-decoration: none; }
    .btn-danger  { background: #ef4444; color: white; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-ghost   { background: #e5e7eb; color: #374151; }
    .btn:hover { opacity: 0.9; }
    #log { font-size: 13px; color: #374151; }
    .row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb; }
    .row:last-child { border-bottom: none; margin-bottom: 0; }
    .del-btn { flex-shrink: 0; padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; background: #fee2e2; color: #b91c1c; }
    .del-btn:hover { background: #fca5a5; }
    .info { flex: 1; }
    .title { font-weight: 600; font-size: 13px; }
    .detail { font-size: 12px; color: #6b7280; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>🔧 Диагностика данных</h1>
  <p class="sub">Страница для просмотра и очистки данных аренды из localStorage</p>

  <div class="card" id="rentals-card">
    <strong>Аренды (app_gantt_rentals)</strong>
    <div id="rentals-list" style="margin-top:12px">Загружается...</div>
  </div>

  <div class="card" id="equip-card">
    <strong>Техника (app_equipment)</strong>
    <div id="equip-list" style="margin-top:12px">Загружается...</div>
  </div>

  <div class="card" id="actions-card">
    <strong>Быстрые действия</strong>
    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-danger" onclick="clearCreated()">Удалить все «созданные» аренды</button>
      <button class="btn btn-ghost"  onclick="clearAll()">Очистить ВСЕ аренды</button>
      <a class="btn btn-primary" href="/rental-management/">← Вернуться в приложение</a>
    </div>
    <div id="log" style="margin-top:12px"></div>
  </div>

  <script>
    var RENTALS_KEY = 'app_gantt_rentals';
    var EQUIP_KEY   = 'app_equipment';

    function statusBadge(s) {
      return '<span class="badge badge-' + s + '">' + s + '</span>';
    }

    function renderRentals() {
      var list = document.getElementById('rentals-list');
      var raw  = localStorage.getItem(RENTALS_KEY);
      var data = [];
      try { data = JSON.parse(raw || '[]'); } catch(e) {}

      if (!data.length) { list.innerHTML = '<em style="color:#6b7280">Аренд нет</em>'; return; }

      var html = '';
      data.forEach(function(r) {
        html += '<div class="row">';
        html += '<button class="del-btn" onclick="deleteRental(\'' + r.id + '\')">Удалить</button>';
        html += '<div class="info">';
        html += '<div class="title mono">' + r.id + ' &nbsp; ' + statusBadge(r.status) + '</div>';
        html += '<div class="detail">';
        html += '📦 ' + r.equipmentInv + ' &nbsp; ';
        html += '👤 ' + (r.client || '—') + ' &nbsp; ';
        html += '📅 ' + r.startDate + ' → ' + r.endDate;
        html += '</div></div></div>';
      });
      list.innerHTML = html;
    }

    function renderEquipment() {
      var list = document.getElementById('equip-list');
      var raw  = localStorage.getItem(EQUIP_KEY);
      var data = [];
      try { data = JSON.parse(raw || '[]'); } catch(e) {}

      if (!data.length) { list.innerHTML = '<em style="color:#6b7280">Техники нет</em>'; return; }

      var html = '';
      data.forEach(function(e) {
        html += '<div class="row">';
        html += '<div class="info">';
        html += '<div class="title mono">' + e.inventoryNumber + ' &nbsp; ' + e.model + ' &nbsp; ' + statusBadge(e.status) + '</div>';
        html += '</div></div>';
      });
      list.innerHTML = html;
    }

    function deleteRental(id) {
      var data = JSON.parse(localStorage.getItem(RENTALS_KEY) || '[]');
      var filtered = data.filter(function(r) { return r.id !== id; });
      localStorage.setItem(RENTALS_KEY, JSON.stringify(filtered));
      log('Удалена аренда ' + id);
      renderRentals();
      syncEquipment(filtered);
    }

    function clearCreated() {
      var data = JSON.parse(localStorage.getItem(RENTALS_KEY) || '[]');
      var before = data.length;
      var filtered = data.filter(function(r) { return r.status !== 'created'; });
      localStorage.setItem(RENTALS_KEY, JSON.stringify(filtered));
      log('Удалено аренд со статусом «created»: ' + (before - filtered.length));
      renderRentals();
      syncEquipment(filtered);
    }

    function clearAll() {
      if (!confirm('Удалить ВСЕ аренды? Это нельзя отменить.')) return;
      localStorage.setItem(RENTALS_KEY, '[]');
      log('Все аренды удалены');
      renderRentals();
      syncEquipment([]);
    }

    function syncEquipment(rentals) {
      var eq = JSON.parse(localStorage.getItem(EQUIP_KEY) || '[]');
      var today = new Date().toISOString().split('T')[0];
      var updated = eq.map(function(e) {
        if (e.status === 'inactive' || e.status === 'in_service') return e;
        var active = rentals.filter(function(r) {
          return r.equipmentInv === e.inventoryNumber &&
                 r.status !== 'returned' && r.status !== 'closed';
        });
        if (!active.length) return Object.assign({}, e, { status: 'available' });
        var current = active.find(function(r) { return r.startDate <= today && r.endDate >= today; });
        if (current) return Object.assign({}, e, { status: current.status === 'active' ? 'rented' : 'reserved' });
        return Object.assign({}, e, { status: 'reserved' });
      });
      localStorage.setItem(EQUIP_KEY, JSON.stringify(updated));
      renderEquipment();
    }

    function log(msg) {
      var el = document.getElementById('log');
      el.innerHTML += '<div>✅ ' + msg + '</div>';
    }

    renderRentals();
    renderEquipment();
  </script>
</body>
</html>
