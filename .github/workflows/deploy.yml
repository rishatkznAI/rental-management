name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.*'
      - 'postcss.config.*'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/vite-build.mjs'
      - '.github/workflows/deploy.yml'
      - 'scripts/release-preflight.mjs'
      - 'scripts/frontend-build-marker.mjs'
      - 'scripts/backend-release-marker.mjs'
      - 'e2e/helpers/auth.ts'
      - 'e2e/helpers/releaseSmoke.ts'
      - 'e2e/*smoke.spec.ts'
      - 'e2e/auth-login.spec.ts'
      - 'e2e/sidebar-navigation.spec.ts'
      - 'e2e/production-smoke.spec.ts'
      - 'e2e/production-ui-selector-smoke.spec.ts'
      - 'tests/release-preflight.test.js'
      - 'tests/release-smoke-conservation.test.js'
      - 'docs/*release*.md'
      - 'docs/**/*release*.md'
      - 'docs/*deploy*.md'
      - 'docs/**/*deploy*.md'
      - 'docs/*smoke*.md'
      - 'docs/**/*smoke*.md'
      - 'docs/*preflight*.md'
      - 'docs/**/*preflight*.md'
  workflow_dispatch:
    inputs:
      release_type:
        description: Type of release being deployed
        required: true
        type: choice
        default: full-stack
        options:
          - frontend-only
          - backend
          - full-stack
          - deploy-tooling
          - frontend-deploy-tooling

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  classify-release:
    name: Classify release
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.classify.outputs.release_type }}
      changed_files: ${{ steps.classify.outputs.changed_files }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 HEAD)"
            fi
            mapfile -t files < <(git diff --name-only "$base" "${GITHUB_SHA}" | sed '/^$/d')
          else
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              mapfile -t files < <(git diff --name-only HEAD^ HEAD | sed '/^$/d')
            else
              mapfile -t files < <(git diff-tree --no-commit-id --name-only -r --root HEAD | sed '/^$/d')
            fi
          fi

          changed_files="$(IFS=,; echo "${files[*]}")"
          echo "changed_files=$changed_files" >> "$GITHUB_OUTPUT"

          requested_release_type="${{ inputs.release_type || '' }}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_type="${requested_release_type:-full-stack}"
            echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
            {
              echo "### Release classification"
              echo
              echo "- event: workflow_dispatch"
              echo "- release_type: \`$release_type\`"
              echo "- changed files:"
              printf '  - `%s`\n' "${files[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          frontend_allowed='^(src/|public/|tests/.*\.test\.js$|docs/.*\.md$|index\.html$|vite\.config\.[^/]+$|postcss\.config\.[^/]+$|tsconfig[^/]*\.json$|package\.json$|package-lock\.json$|scripts/vite-build\.mjs$)'
          deploy_tooling_allowed='^(\.github/workflows/(deploy|.*smoke)\.yml|scripts/release-preflight\.mjs|scripts/frontend-build-marker\.mjs|scripts/backend-release-marker\.mjs|scripts/finance-smoke-equipment-discovery\.mjs|e2e/helpers/(auth|releaseSmoke)\.ts|e2e/dashboard-layout\.spec\.ts|e2e/.*smoke\.spec\.ts|e2e/auth-login\.spec\.ts|e2e/sidebar-navigation\.spec\.ts|tests/release-preflight\.test\.js|tests/release-smoke-conservation\.test\.js|docs/.*(release|deploy|smoke|preflight).*\.md)$'
          release_critical='^((server|backend|api|routes|lib|db|storage|migrations)/|server/data/|.*(^|/)(app\.sqlite|.*\.sqlite3?|.*\.db)$|.*(^|/)(railway\.json|railway\.toml|nixpacks\.toml|Procfile|Dockerfile(\.[^/]*)?|docker-compose\.ya?ml|render\.ya?ml|fly\.toml)$|\.railway/|.*(^|/)\.env($|[.-])|.*(^|/)[^/]*(secret|token|credential)[^/]*($|\.)|(config|configs)/|(server|api|backend)\.(config|env)\.)'

          has_frontend_runtime=0
          has_deploy_tooling=0
          blocked=()

          for file in "${files[@]}"; do
            if [[ "$file" =~ ^docs/pr-assets/dashboard-dark-theme/.*\.png$ && ! -e "$file" ]]; then
              continue
            fi
            if [[ "$file" =~ $release_critical ]]; then
              blocked+=("$file")
              continue
            fi
            if [[ "$file" =~ $deploy_tooling_allowed ]]; then
              has_deploy_tooling=1
              continue
            fi
            if [[ "$file" =~ $frontend_allowed ]]; then
              [[ "$file" =~ ^(src/|public/|index\.html$|vite\.config\.|postcss\.config\.|tsconfig|package\.json$|package-lock\.json$|scripts/vite-build\.mjs$) ]] && has_frontend_runtime=1
              continue
            fi
            blocked+=("$file")
          done

          if (( ${#blocked[@]} > 0 )); then
            {
              echo "### Production deploy blocked"
              echo
              echo "Automatic GitHub Pages deploy did not run because this push changed backend or deploy-critical files."
              echo "Run the appropriate \`backend\` or \`full-stack\` release after the backend deployment is verified."
              echo
              echo "Blocked files:"
              printf -- "- \`%s\`\n" "${blocked[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
            printf 'Backend/deploy-critical files changed:\n'
            printf ' - %s\n' "${blocked[@]}"
            exit 1
          fi

          if (( has_deploy_tooling == 1 && has_frontend_runtime == 1 )); then
            release_type="frontend-deploy-tooling"
          elif (( has_deploy_tooling == 1 )); then
            release_type="deploy-tooling"
          else
            release_type="frontend-only"
          fi

          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
          {
            echo "### Release classification"
            echo
            echo "- event: push"
            echo "- release_type: \`$release_type\`"
            echo "- expected commit: \`${GITHUB_SHA}\`"
            echo "- changed files:"
            printf '  - `%s`\n' "${files[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

  basic-ci:
    name: Basic CI
    runs-on: ubuntu-latest
    needs: classify-release
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Check whitespace
        run: git diff --check

      - name: Write backend release marker
        run: |
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          node scripts/backend-release-marker.mjs --commit "$GITHUB_SHA" --release-type "$RELEASE_TYPE" --build-time "$build_time"
        env:
          RELEASE_TYPE: ${{ needs.classify-release.outputs.release_type }}

      - name: Validate production release secrets
        run: |
          test -n "$PRODUCTION_API_URL"
          test -n "$PRODUCTION_FRONTEND_URL"
          test -n "$PRODUCTION_ADMIN_EMAIL"
          test -n "$PRODUCTION_ADMIN_PASSWORD"
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          PRODUCTION_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_APP_BRAND_NAME: ${{ vars.VITE_APP_BRAND_NAME || 'RentCore' }}
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}
          VITE_RELEASE_TYPE: ${{ needs.classify-release.outputs.release_type }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: basic-ci
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke spec
        run: npx playwright test e2e/smoke.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

  deploy:
    name: Deploy and production gate
    needs:
      - classify-release
      - basic-ci
      - playwright-smoke
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for GitHub Pages propagation
        run: sleep 30

      - name: Write release changed file scope
        run: printf '%s\n' "$RELEASE_PREFLIGHT_CHANGED_FILES" > "$CHANGED_FILES_FILE"
        env:
          RELEASE_PREFLIGHT_CHANGED_FILES: ${{ needs.classify-release.outputs.changed_files }}
          CHANGED_FILES_FILE: ${{ runner.temp }}/release-changed-files.txt

      - name: Run production release preflight
        run: npm run release:preflight -- --env production --expected-commit "$EXPECTED_RELEASE_COMMIT" --release-type "$RELEASE_TYPE" --changed-files-file "$CHANGED_FILES_FILE"
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TYPE: ${{ needs.classify-release.outputs.release_type }}
          RELEASE_PREFLIGHT_CHANGED_FILES: ${{ needs.classify-release.outputs.changed_files }}
          CHANGED_FILES_FILE: ${{ runner.temp }}/release-changed-files.txt

      - name: Verify public frontend build marker
        run: node scripts/frontend-build-marker.mjs --frontend-url "$PRODUCTION_FRONTEND_URL" --expected-commit "$EXPECTED_RELEASE_COMMIT" --api-url "$PRODUCTION_API_URL"
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TYPE: ${{ needs.classify-release.outputs.release_type }}

      - name: Run production targeted GET smoke
        run: npm run release:targeted-smoke -- --env production
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          PRODUCTION_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}

      - name: Run production smoke login
        run: npm run test:e2e:production-smoke
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_ADMIN_EMAIL: ${{ secrets.PRODUCTION_ADMIN_EMAIL }}
          PRODUCTION_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_ADMIN_PASSWORD }}
          EXPECTED_RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TYPE: ${{ needs.classify-release.outputs.release_type }}

      - name: Upload production dashboard cockpit screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-dashboard-cockpit-screenshots
          path: test-results/**/production-dashboard-cockpit-*.png
          if-no-files-found: ignore

      - name: Upload production Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload production Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-test-results
          path: test-results/
          if-no-files-found: ignore
