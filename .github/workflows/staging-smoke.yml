name: Staging Smoke

on:
  workflow_dispatch:
    inputs:
      expected_release_commit:
        description: 'Expected deployed staging app commit SHA. Defaults to workflow SHA.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: staging-smoke
  cancel-in-progress: true

jobs:
  staging-smoke:
    name: Staging read-only smoke
    runs-on: ubuntu-latest
    env:
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
      STAGING_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
      STAGING_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
      EXPECTED_RELEASE_COMMIT: ${{ inputs.expected_release_commit || github.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Validate staging secrets
        run: |
          test -n "$STAGING_API_URL"
          test -n "$STAGING_FRONTEND_URL"
          test -n "$STAGING_ADMIN_EMAIL"
          test -n "$STAGING_ADMIN_PASSWORD"

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Run staging release preflight
        run: npm run release:preflight -- --env staging --expected-commit "$EXPECTED_RELEASE_COMMIT"

      - name: Run staging targeted GET smoke
        run: npm run release:targeted-smoke -- --env staging

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run staging smoke
        run: npm run test:e2e:staging-smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-test-results
          path: test-results/
          if-no-files-found: ignore
