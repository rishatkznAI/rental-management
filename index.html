
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- Запрет кеширования index.html браузером: всегда загружать свежий бандл -->
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
      <meta http-equiv="Pragma" content="no-cache" />
      <meta http-equiv="Expires" content="0" />
      <title>Система управления арендой</title>
      <script>
        // GitHub Pages SPA redirect: /404.html sends ?p=/path&q=...
        // Convert it back to a normal browser URL before React Router starts.
        (function(l) {
          if (l.search && l.search[1] === '/') {
            var decoded = l.search
              .slice(1)
              .split('&')
              .map(function(s) { return s.replace(/~and~/g, '&'); })
              .join('?');
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        })(window.location);

        // ── Принудительный сброс кеша браузера ──────────────────────────────
        // При новом деплое меняем BUILD_TS — браузер перезагружает страницу,
        // получает свежий index.html с новыми хешированными бандлами.
        // Используем localStorage (не sessionStorage), чтобы сброс не повторялся
        // при каждом открытии вкладки.
        (function() {
          var CACHE_KEY = '__app_cache_v';
          var BUILD_TS  = '20260417_170000';
          var stored    = localStorage.getItem(CACHE_KEY);
          if (stored !== BUILD_TS) {
            localStorage.setItem(CACHE_KEY, BUILD_TS);
            // Перезагружаем, чтобы браузер подхватил свежие хешированные бандлы.
            window.location.reload();
          }
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
